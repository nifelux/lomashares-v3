<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Refer</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="notice"></div>

  <header class="topbar">
    <div class="brand">LOMASHARES</div>
  </header>

  <main class="page">
    <div class="panel card">
      <div class="big">Invite & Earn</div>
      <div class="muted" style="margin-top:8px">
        Share your referral code. When your referred user invests, you earn rewards.
      </div>

      <div class="section-title">Your referral code</div>
      <div class="panel card" style="margin-top:10px">
        <div id="refCode" class="big">Loading…</div>
        <div class="muted">Tap copy to share with friends.</div>
        <div class="row" style="margin-top:12px">
          <button class="btn primary" id="copyBtn" type="button" style="flex:1">Copy</button>
          <a class="btn ghost" href="register.html" style="flex:1">Register Link</a>
        </div>
      </div>

      <div class="section-title">How it works</div>
      <div class="muted">
        1) Friend registers with your code<br/>
        2) Friend invests<br/>
        3) Bonus is applied automatically based on backend rules
      </div>
    </div>
  </main>

  <footer class="footer">
    <nav class="nav" id="bottomNav"></nav>
  </footer>

  <script type="module" src="refer.js"></script>
</body>
  </html>
