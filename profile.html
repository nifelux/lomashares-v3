<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Profile</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="notice"></div>

  <header class="topbar">
    <div class="brand">LOMASHARES</div>
    <div class="right">
      <button class="btn danger" style="padding:10px 12px" id="logoutBtn" type="button">Logout</button>
    </div>
  </header>

  <main class="page">
    <div class="panel card">
      <div class="row" style="align-items:center">
        <!-- 40% avatar -->
        <div style="width:40%;display:flex;justify-content:center">
          <div style="
            width:86px;height:86px;border-radius:50%;
            background:linear-gradient(180deg, rgba(27,117,255,.35), rgba(0,0,0,.25));
            border:1px solid rgba(255,255,255,.10);
            display:flex;align-items:center;justify-content:center;
            font-weight:950;font-size:22px;color:rgba(230,240,255,.95);
          " id="avatar">LS</div>
        </div>

        <!-- 60% text -->
        <div style="width:60%">
          <div class="small">Account</div>
          <div id="name" class="big" style="margin-top:4px">Loading…</div>
          <div id="email" class="muted" style="margin-top:4px">Loading…</div>
        </div>
      </div>

      <div class="section-title">Wallet Balance</div>
      <div id="bal" class="big">₦0</div>

      <div class="section-title">History & Links</div>

      <a class="klink" href="transactions.html" style="height:90px;margin-top:10px">
        <div><div style="font-weight:950">Transaction History</div><span>All activities</span></div>
        <div class="badge">→</div>
      </a>

      <a class="klink" href="withdrawals.html" style="height:90px;margin-top:10px">
        <div><div style="font-weight:950">Withdrawal History</div><span>Your payouts</span></div>
        <div class="badge">→</div>
      </a>

      <a class="klink" href="deposits.html" style="height:90px;margin-top:10px">
        <div><div style="font-weight:950">Deposit History</div><span>Your funding</span></div>
        <div class="badge">→</div>
      </a>

      <a class="klink" href="https://t.me/YOUR_TELEGRAM" target="_blank" style="height:90px;margin-top:10px">
        <div><div style="font-weight:950">Join Telegram Group</div><span>Community updates</span></div>
        <div class="badge">↗</div>
      </a>

      <a class="klink" href="https://wa.me/YOUR_WHATSAPP" target="_blank" style="height:90px;margin-top:10px">
        <div><div style="font-weight:950">Join WhatsApp Group</div><span>Support & info</span></div>
        <div class="badge">↗</div>
      </a>
    </div>
  </main>

  <footer class="footer"><nav class="nav" id="bottomNav"></nav></footer>

  <script type="module" src="profile.js"></script>
</body>
</html>
