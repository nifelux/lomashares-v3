<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deposit Verification — LomaShares</title>
  <link rel="stylesheet" href="style.css" />

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="auth-guard.js"></script>
</head>
<body>
  <main class="container">
    <section class="card mini">
      <h2 class="h4">Verifying payment…</h2>
      <p class="muted" id="status">Please wait.</p>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");

    function getUserId() {
      const raw = localStorage.getItem("lomashares_user") || localStorage.getItem("user");
      if (raw) {
        try { return JSON.parse(raw)?.id || JSON.parse(raw)?.user_id || null; } catch { /* ignore */ }
      }
      return localStorage.getItem("user_id");
    }

    (async () => {
      const params = new URLSearchParams(window.location.search);
      const reference = params.get("reference");
      const user_id = getUserId();

      if (!reference) {
        statusEl.textContent = "Missing reference. If you paid, contact support.";
        return;
      }
      if (!user_id) {
        statusEl.textContent = "Login required. Please login and try again.";
        return;
      }

      const r = await fetch("/api/wallet", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "paystack_verify_and_credit", user_id, reference })
      });

      const data = await r.json();

      if (!r.ok || data.error) {
        statusEl.textContent = data.error || "Verification failed. Contact support.";
        return;
      }

      statusEl.textContent = data.already_credited
        ? "Payment already credited. Redirecting…"
        : "Payment verified! Wallet credited. Redirecting…";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1200);
    })();
  </script>
</body>
  </html>
