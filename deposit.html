<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Deposit</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="notice"></div>

  <header class="topbar">
    <div class="brand">LOMASHARES</div>
    <div class="right">
      <a class="btn ghost" style="padding:10px 12px" href="dashboard.html">Home</a>
    </div>
  </header>

  <main class="page">
    <div class="panel card">
      <div class="big">Deposit</div>
      <div class="muted" style="margin-top:6px">Fund your wallet with Paystack (redirect flow).</div>

      <div class="section-title">Amount (₦)</div>
      <input class="input" id="amount" inputmode="numeric" placeholder="Minimum ₦1,000"/>

      <div class="section-title">Quick Amount</div>
      <div class="row" style="flex-wrap:wrap">
        <button class="btn ghost" data-a="1000" type="button">₦1,000</button>
        <button class="btn ghost" data-a="5000" type="button">₦5,000</button>
        <button class="btn ghost" data-a="10000" type="button">₦10,000</button>
        <button class="btn ghost" data-a="30000" type="button">₦30,000</button>
        <button class="btn ghost" data-a="50000" type="button">₦50,000</button>
        <button class="btn ghost" data-a="100000" type="button">₦100,000</button>
      </div>

      <button class="btn primary" style="width:100%;margin-top:14px" id="payBtn" type="button">
        Proceed to Paystack
      </button>

      <div class="muted" style="margin-top:10px" id="statusLine"></div>
    </div>
  </main>

  <footer class="footer">
    <nav class="nav" id="bottomNav"></nav>
  </footer>

  <script type="module" src="deposit.js"></script>
</body>
</html>
