<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Register</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="notice"></div>

  <header class="topbar">
    <div class="brand">LOMASHARES</div>
    <div class="right">
      <a class="btn ghost" style="padding:10px 12px" href="index.html">Login</a>
    </div>
  </header>

  <main class="page">
    <div class="panel card">
      <div class="big">Create account</div>
      <div class="muted" style="margin-top:6px">Start investing and earning daily.</div>

      <div class="section-title">Email</div>
      <input class="input" id="email" type="email" placeholder="you@example.com" autocomplete="email"/>

      <div class="section-title">Password</div>
      <input class="input" id="password" type="password" placeholder="Create password" autocomplete="new-password"/>

      <div class="section-title">Referral Code (optional)</div>
      <input class="input" id="ref" type="text" placeholder="LOMA123456"/>

      <button class="btn primary" style="width:100%;margin-top:14px" id="regBtn" type="button">
        Register
      </button>

      <div class="muted" style="margin-top:12px;text-align:center">
        Already have an account? <a href="index.html" style="color:#a8c8ff;font-weight:900;text-decoration:none">Login</a>
      </div>
    </div>
  </main>

  <script type="module">
    import "./config.js";
    import "./supabase.js";
    import "./ui.js";
    import "./auth-guard.js";
    import "./auth.js";

    const { toast } = window.LomaUI;

    document.getElementById("regBtn").addEventListener("click", async ()=>{
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const referralCode = document.getElementById("ref").value.trim().toUpperCase();

      if(!email || !password) return toast("Enter email and password");
      if(password.length < 6) return toast("Password must be at least 6 characters");

      try{
        await window.LomaAuth.register(email, password, referralCode);
      }catch(e){
        toast(e?.message || "Registration failed");
      }
    });
  </script>
</body>
        </html>
