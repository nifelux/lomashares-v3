<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Gift Code</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="notice"></div>

  <header class="topbar">
    <div class="brand">LOMASHARES</div>
  </header>

  <main class="page">
    <div class="panel card">
      <div class="big">Redeem Gift Code</div>
      <div class="muted" style="margin-top:8px">Enter a valid gift code to credit your wallet instantly.</div>

      <div class="section-title">Gift Code</div>
      <input class="input" id="giftCode" placeholder="e.g. GIFT123456" />

      <button class="btn primary" style="width:100%;margin-top:12px" id="redeemBtn" type="button">
        Redeem
      </button>
    </div>
  </main>

  <footer class="footer">
    <nav class="nav" id="bottomNav"></nav>
  </footer>

  <script type="module" src="gift.js"></script>
</body>
    </html>
