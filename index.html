<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="notice"></div>

  <header class="topbar">
    <div class="brand">LOMASHARES</div>
    <div class="right">
      <a class="btn ghost" style="padding:10px 12px" href="register.html">Register</a>
    </div>
  </header>

  <main class="page">
    <div class="panel card">
      <div class="big">Welcome back</div>
      <div class="muted" style="margin-top:6px">Login to continue to your dashboard.</div>

      <div class="section-title">Email</div>
      <input class="input" id="email" type="email" placeholder="you@example.com" autocomplete="email"/>

      <div class="section-title">Password</div>
      <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>

      <button class="btn primary" style="width:100%;margin-top:14px" id="loginBtn" type="button">
        Login
      </button>

      <div class="muted" style="margin-top:12px;text-align:center">
        New here? <a href="register.html" style="color:#a8c8ff;font-weight:900;text-decoration:none">Create account</a>
      </div>
    </div>
  </main>

  <script type="module">
    import "./config.js";
    import "./supabase.js";
    import "./ui.js";
    import "./auth-guard.js";
    import "./auth.js";

    const { toast } = window.LomaUI;

    document.getElementById("loginBtn").addEventListener("click", async ()=>{
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      if(!email || !password) return toast("Enter email and password");

      try{
        await window.LomaAuth.login(email, password);
      }catch(e){
        toast(e?.message || "Login failed");
      }
    });
  </script>
</body>
</html>
