<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LomaShares — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app auth-page" data-page="login"
  data-supabase-url="YOUR_SUPABASE_URL"
  data-supabase-anon="YOUR_SUPABASE_ANON_KEY">

  <!-- Sticky Header -->
  <header class="topbar">
    <button class="icon-btn" type="button" id="menuBtn" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="brand">
      <div class="brand-name">LOMASHARES</div>
      <div class="brand-sub">Secure Login</div>
    </div>

    <a class="icon-btn" href="register.html" aria-label="Register">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </a>
  </header>

  <!-- Slide Menu -->
  <aside class="sheet" id="sheet" aria-hidden="true">
    <div class="sheet-head">
      <div class="sheet-title">Menu</div>
      <button class="icon-btn" type="button" id="closeSheet" aria-label="Close">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <nav class="sheet-nav">
      <a href="index.html" class="sheet-link active">Login</a>
      <a href="register.html" class="sheet-link">Register</a>
      <a href="about.html" class="sheet-link">About</a>
    </nav>
  </aside>
  <div class="backdrop" id="backdrop" hidden></div>

  <main class="main auth-main">
    <section class="auth-card">
      <div class="auth-logo">
        <!-- Put your logo image here -->
        <img src="YOUR_LOGO.png" alt="LomaShares" onerror="this.style.display='none'">
        <div class="auth-logo-fallback">LS</div>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Login to manage your wallet and investments.</p>

      <div class="form">
        <label class="lbl">Email</label>
        <input class="inp" type="email" id="email" placeholder="you@gmail.com" autocomplete="email" />

        <label class="lbl">Password</label>
        <input class="inp" type="password" id="password" placeholder="Your password" autocomplete="current-password" />

        <button class="btn primary" id="loginBtn" type="button">Login</button>

        <div class="row">
          <a class="link" href="register.html">Create an account</a>
          <button class="link-btn" type="button" id="forgotBtn">Forgot password?</button>
        </div>

        <div class="notice" id="msg" hidden></div>
      </div>

      <div class="auth-foot">
        <div class="fine">
          By continuing, you agree to our <b>Terms</b> and <b>Privacy Policy</b>.
        </div>
      </div>
    </section>

    <div class="spacer"></div>
  </main>

  <!-- Supabase CDN (no package.json needed) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>
