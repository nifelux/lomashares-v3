<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LomaShares — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body
  data-page="login"
  data-supabase-url="https://lpnnqxalmihxgszoifpa.supabase.co"
  data-supabase-anon="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxwbm5xeGFsbWloeGdzem9pZnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzM1ODEsImV4cCI6MjA4NzMwOTU4MX0.1hLW5gizjcPTKyfzx_XD9dxqegtXVQroNCclX1AaqZw"
>
  <!-- Sticky Header -->
  <header class="topbar">
    <div class="brand">
      <div class="name">LOMASHARES</div>
      <div class="sub">Secure Login</div>
    </div>
  </header>

  <main class="container auth-wrap">
    <section class="card auth-card">
      <div class="logo">LS</div>
      <h1 class="h1">Welcome Back</h1>
      <p class="p">Login to manage your wallet, invest, and track earnings.</p>

      <div class="stack">
        <input class="field" id="email" type="email" placeholder="Email address" autocomplete="email" />
        <input class="field" id="password" type="password" placeholder="Password" autocomplete="current-password" />
        <button class="btn" id="loginBtn" type="button">Login</button>
        <button class="btn secondary" type="button" onclick="window.location.href='register.html'">Create Account</button>
      </div>

      <div class="small-links">
        <a href="#" id="aboutLink">About</a>
        <a href="#" id="helpLink">Help</a>
      </div>

      <div class="notice" id="notice"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>

  <script>
    (function(){
      "use strict";

      const SB_URL = document.body.getAttribute("data-supabase-url");
      const SB_ANON = document.body.getAttribute("data-supabase-anon");
      const notice = document.getElementById("notice");

      function show(msg){
        notice.textContent = msg;
        notice.classList.add("show");
      }

      if(!SB_URL || !SB_ANON){
        show("Config error: Supabase keys missing on this page.");
        return;
      }

      const supabase = window.supabase.createClient(SB_URL, SB_ANON);

      // Guard: if already logged in -> dashboard
      async function guard(){
        const { data } = await supabase.auth.getSession();
        if(data?.session){
          window.location.replace("dashboard.html");
        }
      }

      async function login(){
        const email = (document.getElementById("email").value || "").trim().toLowerCase();
        const password = document.getElementById("password").value || "";

        if(!email || !password) return show("Enter your email and password.");

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if(error) return show(error.message);

        // confirm session
        const { data } = await supabase.auth.getSession();
        if(!data?.session) return show("Login session not saved. Check your Supabase Auth settings.");

        window.location.replace("dashboard.html");
      }

      document.getElementById("loginBtn").addEventListener("click", login);
      document.addEventListener("DOMContentLoaded", guard);

      // optional links
      document.getElementById("aboutLink").addEventListener("click", (e)=>{ e.preventDefault(); show("About page coming soon."); });
      document.getElementById("helpLink").addEventListener("click", (e)=>{ e.preventDefault(); show("Support: contact admin for help."); });
    })();
  </script>
</body>
  </html>
