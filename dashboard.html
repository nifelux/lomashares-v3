<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LomaShares • Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="notice"></div>

  <header class="topbar">
    <div class="brand">LOMASHARES</div>
    <div class="right">
      <a class="btn ghost" style="padding:10px 12px" href="profile.html">Profile</a>
    </div>
  </header>

  <main class="page">
    <!-- Balance Card -->
    <div class="panel card">
      <div class="small">Wallet Balance</div>
      <div id="bal" class="big" style="margin-top:6px">₦0</div>
      <div class="muted" id="emailLine" style="margin-top:6px">Loading…</div>

      <div class="row" style="margin-top:12px">
        <a class="btn primary" style="flex:1" href="deposit.html">Deposit</a>
        <a class="btn ghost" style="flex:1" href="withdraw.html">Withdraw</a>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="section-title">Quick Links</div>
    <div class="panel">
      <div class="klinks">
        <a class="klink" href="deposit.html">
          <div><div style="font-weight:950">Deposit</div><span>Fund your wallet</span></div>
          <div class="badge">→</div>
        </a>
        <a class="klink" href="withdraw.html">
          <div><div style="font-weight:950">Withdraw</div><span>Request payout</span></div>
          <div class="badge">→</div>
        </a>
        <a class="klink" href="gift.html">
          <div><div style="font-weight:950">Gift Code</div><span>Redeem bonus</span></div>
          <div class="badge">→</div>
        </a>
        <a class="klink" href="refer.html">
          <div><div style="font-weight:950">Refer</div><span>Invite & earn</span></div>
          <div class="badge">→</div>
        </a>
      </div>
    </div>

    <!-- Products -->
    <div class="section-title">Investment Plans</div>
    <div class="panel">
      <div class="grid" id="products"></div>
    </div>
  </main>

  <footer class="footer">
    <nav class="nav" id="bottomNav"></nav>
  </footer>

  <script type="module" src="dashboard.js"></script>
</body>
                                                                                        </html>
<div id="notice"></div>

<header class="topbar">
  <div class="brand">LOMASHARES</div>
  <div class="right">
    <a class="btn ghost" style="padding:10px 12px" href="profile.html">Profile</a>
  </div>
</header>

<footer class="footer">
  <nav class="nav" id="bottomNav"></nav>
</footer>

<script type="module">
  import "./config.js";
  import "./supabase.js";
  import "./ui.js";
  import "./auth-guard.js";

  const { svgHome, svgInvest, svgTeam, svgProfile } = window.LomaUI;
  const page = (location.pathname.split("/").pop() || "dashboard.html").toLowerCase();
  const nav = document.getElementById("bottomNav");
  if(nav){
    nav.innerHTML = `
      <a href="dashboard.html" class="${page==='dashboard.html'?'active':''}">${svgHome()}Home</a>
      <a href="investment.html" class="${page==='investment.html'?'active':''}">${svgInvest()}Invest</a>
      <a href="team.html" class="${page==='team.html'?'active':''}">${svgTeam()}Team</a>
      <a href="profile.html" class="${page==='profile.html'?'active':''}">${svgProfile()}Profile</a>
    `;
  }
</script>
