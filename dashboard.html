  <!-- Footer Nav -->

    <a class="navitem" href="profile.html">

        <path d="M4 21c.8-4 4.1-6 8-6s7.2 2 8 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>

  <script>
    (function(){
      "use strict";

      const SB_URL = document.body.getAttribute("data-supabase-url");
      const SB_ANON = document.body.getAttribute("data-supabase-anon");
      const notice = document.getElementById("notice");

      function show(msg){
        notice.textContent = msg;
        notice.classList.add("show");
      }
      function formatNaira(n){
        return "₦" + Number(n || 0).toLocaleString("en-NG");
      }

      if(!SB_URL || !SB_ANON){
        show("Config error: Supabase keys missing on this page.");
        return;
      }

      const supabase = window.supabase.createClient(SB_URL, SB_ANON);

      // Guard: if not logged in -> login
      async function guard(){
        const { data } = await supabase.auth.getSession();
        if(!data?.session){
          window.location.replace("index.html");
          return null;
        }
        return data.session;
      }

      const PRODUCTS = [
        { id: 1, price: 3000 },
        { id: 2, price: 5000 },
        { id: 3, price: 7000 },
        { id: 4, price: 10000 },
        { id: 5, price: 15000 },
        { id: 6, price: 20000 },
        { id: 7, price: 30000 },
        { id: 8, price: 40000 },
        { id: 9, price: 50000 },
        { id: 10, price: 100000 }
      ];

      function renderProducts(){
        const wrap = document.getElementById("products");
        if(!wrap) return;

        wrap.innerHTML = "";
        PRODUCTS.forEach(p=>{
          const totalReturn = p.price * 2; // 200%
          const daily = totalReturn / 30;

          const card = document.createElement("div");
          card.className = "card pcard";
          card.innerHTML = `
            <div class="phead">
              <div>
                <div class="ptitle">Product ${p.id}</div>
                <div class="pmeta">
                  <span class="price">${formatNaira(p.price)}</span>
                  <br/>Daily Income: <b>${formatNaira(daily.toFixed(0))}</b>
                  <br/>Duration: <b>30 days</b> • Total Return: <b>${formatNaira(totalReturn)}</b>
                </div>
                <div class="tag">200% ROI • Automatic Daily Credit</div>
              </div>
            </div>

            <div class="pactions">
              <button class="primary" data-invest="${p.id}">Invest</button>
              <button data-deposit="1">Deposit</button>
            </div>
          `;
          wrap.appendChild(card);
        });

        // Buttons
        wrap.querySelectorAll("button[data-deposit]").forEach(btn=>{
          btn.addEventListener("click", ()=> location.href="deposit.html");
        });

        wrap.querySelectorAll("button[data-invest]").forEach(btn=>{
          btn.addEventListener("click", ()=>{
            const pid = btn.getAttribute("data-invest");
            alert("Invest flow will be connected to /api/investment.js next. Product: " + pid);
          });
        });
      }

      async function loadWallet(session){
        // If you already have /api/wallet (POST {action:"get", user_id})
        try{
          const r = await fetch("/api/wallet", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ action:"get", user_id: session.user.id })
          });
          const j = await r.json().catch(()=>({}));
          if(!r.ok) return show("Wallet API error: " + (j.error || "failed"));

          document.getElementById("walletBalance").textContent = formatNaira(j.balance);
        }catch(e){
          show("Network error fetching wallet.");
        }
      }

      async function loadUser(session){
        document.getElementById("userEmail").textContent = session.user.email || "User";
      }

      async function logout(){
        await supabase.auth.signOut();
        window.location.replace("index.html");
      }

      document.getElementById("logoutBtn").addEventListener("click", logout);

      document.addEventListener("DOMContentLoaded", async ()=>{
        const session = await guard();
        if(!session) return;
        renderProducts();
        loadUser(session);
        loadWallet(session);
      });
    })();
    const { data } = await supabase.auth.getSession();
const token = data?.session?.access_token;

const r = await fetch("/api/investment", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${token}`
  },
  body: JSON.stringify({ product_id: 1 })
});

const j = await r.json();
alert(JSON.stringify(j, null, 2));
  </script>
</body>
