<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LomaShares — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="app" data-page="dashboard">

  <!-- Top Header -->
  <header class="topbar">
    <button class="icon-btn" type="button" id="menuBtn" aria-label="Menu">
      <!-- Hamburger (SVG) -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="brand">
      <div class="brand-name">LOMASHARES</div>
      <div class="brand-sub">Dashboard</div>
    </div>

    <a class="icon-btn" href="profile.html" aria-label="Profile">
      <!-- User Icon -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M20 21c0-3.314-3.582-6-8-6s-8 2.686-8 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </a>
  </header>

  <!-- Slide Menu -->
  <aside class="sheet" id="sheet" aria-hidden="true">
    <div class="sheet-head">
      <div class="sheet-title">Menu</div>
      <button class="icon-btn" type="button" id="closeSheet" aria-label="Close">
        <!-- X -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <nav class="sheet-nav">
      <a href="dashboard.html" class="sheet-link active">Home</a>
      <a href="investment.html" class="sheet-link">Invest</a>
      <a href="team.html" class="sheet-link">Team</a>
      <a href="profile.html" class="sheet-link">Profile</a>
      <div class="sheet-divider"></div>
      <a href="deposit.html" class="sheet-link">Deposit</a>
      <a href="withdraw.html" class="sheet-link">Withdraw</a>
      <a href="gift.html" class="sheet-link">Gift Code</a>
      <a href="refer.html" class="sheet-link">Refer & Earn</a>
    </nav>
  </aside>
  <div class="backdrop" id="backdrop" hidden></div>

  <!-- Main -->
  <main class="main">
    <!-- Wallet Card -->
    <section class="hero-card">
      <div class="hero-top">
        <div>
          <div class="muted">Available Balance</div>
          <div class="balance" id="walletBalance">₦0</div>
        </div>

        <div class="pill" id="statusPill">Secured</div>
      </div>

      <div class="hero-meta">
        <div class="meta-item">
          <div class="meta-k">User</div>
          <div class="meta-v" id="userEmail">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-k">Duration</div>
          <div class="meta-v">30 Days Plans</div>
        </div>
      </div>

      <div class="hero-actions">
        <a class="btn primary" href="deposit.html">Deposit</a>
        <a class="btn ghost" href="withdraw.html">Withdraw</a>
      </div>

      <div class="hint" id="incomeHint" hidden></div>
    </section>

    <!-- Quick Links -->
    <section class="section">
      <div class="section-title">Quick Links</div>
      <div class="quick-grid">
        <a class="quick" href="deposit.html">
          <span class="quick-ic">
            <!-- Plus -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="quick-t">Deposit</span>
        </a>

        <a class="quick" href="withdraw.html">
          <span class="quick-ic">
            <!-- Arrow up-right -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M7 17l10-10M9 7h8v8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="quick-t">Withdraw</span>
        </a>

        <a class="quick" href="gift.html">
          <span class="quick-ic">
            <!-- Gift -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M22 7H2v5h20V7Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M12 22V7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M12 7h4.5a2 2 0 1 0-2-2c-1.5 0-2.5 2-2.5 4Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 7H7.5a2 2 0 1 1 2-2c1.5 0 2.5 2 2.5 4Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="quick-t">Gift</span>
        </a>

        <a class="quick" href="refer.html">
          <span class="quick-ic">
            <!-- Users -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M17 21c0-2.761-2.239-5-5-5s-5 2.239-5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M12 13a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M22 21c0-2.2-1.4-4.1-3.4-4.8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M18 10a3 3 0 1 0-1-5.8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="quick-t">Refer</span>
        </a>
      </div>
    </section>

    <!-- Products -->
    <section class="section">
      <div class="section-head">
        <div class="section-title">Investment Products</div>
        <div class="section-sub">Pick a plan • Earn daily for 30 days</div>
      </div>

      <div class="products" id="productsContainer">
        <!-- JS injects cards -->
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <div class="spacer"></div>
  </main>

  <!-- Bottom Tab Bar -->
  <footer class="tabbar">
    <a class="tab active" href="dashboard.html">
      <span class="tab-ic">
        <!-- Home -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M4 10.5 12 4l8 6.5V20a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9.5Z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M9.5 22V14h5v8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="tab-t">Home</span>
    </a>

    <a class="tab" href="investment.html">
      <span class="tab-ic">
        <!-- Trending up -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 17l6-6 4 4 7-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 8h6v6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="tab-t">Invest</span>
    </a>

    <a class="tab" href="team.html">
      <span class="tab-ic">
        <!-- Users -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M17 21c0-2.761-2.239-5-5-5s-5 2.239-5 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M12 13a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M22 21c0-2.2-1.4-4.1-3.4-4.8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M18 10a3 3 0 1 0-1-5.8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="tab-t">Team</span>
    </a>

    <a class="tab" href="profile.html">
      <span class="tab-ic">
        <!-- Profile -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M20 21c0-3.314-3.582-6-8-6s-8 2.686-8 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="tab-t">Profile</span>
    </a>
  </footer>

  <script src="dashboard.js"></script>
</body>
          </html>
